<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pride-overlay</title>
  </head>
  <body>
    <h1 class="pt-8 font-mono text-3xl">pride-overlay</h1>

    <div class="space-y-4 mb-6">
      <input 
        type="file" 
        id="upload"
        accept="image/*" 
        class="block hover:file:bg-gray-800 file:bg-black file:mr-4 file:px-4 file:py-2 file:border hover:file:border-black file:border-black file:rounded focus:outline-none focus:ring-2 focus:ring-black focus:ring-offset-2 w-full file:font-medium text-gray-700 file:text-white text-sm file:text-sm cursor-pointer"
      />
      
      <div>
        <label for="prideFlag" class="block mb-1 font-medium text-gray-700 text-sm">Pride Flag</label>
        <select 
          id="prideFlag" 
          class="block bg-white px-3 py-2 border border-black rounded focus:outline-none focus:ring-2 focus:ring-black focus:ring-offset-2 w-full text-sm"
        >
          <option value="Agender">Agender</option>
          <option value="Aromantic">Aromantic</option>
          <option value="Asexual">Asexual</option>
          <option value="Bisexual">Bisexual</option>
          <option value="Genderfluid">Genderfluid</option>
          <option value="Genderqueer">Genderqueer</option>
          <option value="Intersex">Intersex</option>
          <option value="Lesbian" selected>Lesbian</option>
          <option value="Nonbinary">Nonbinary</option>
          <option value="Pansexual">Pansexual</option>
          <option value="Polyamory">Polyamory</option>
          <option value="Rainbow">Rainbow</option>
          <option value="Transgender">Transgender</option>
        </select>
      </div>
    </div>

    <div class="gap-x-12 grid grid-cols-3 *:text-center">
      <h2>original</h2>
      <h2>overlay</h2>
      <h2>ring</h2>
      <canvas id="original"></canvas>
      <canvas id="overlay"></canvas>
      <canvas id="ring"></canvas>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
